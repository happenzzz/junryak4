
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>36÷4의 해결 방법 탐구 자료</title>
  <style>
    :root {
      --green-1: #effbd4;
      --green-2: #d9f5a7;
      --green-3: #9dd63b;
      --green-4: #6dae17;
      --line: #b9e77a;
      --pink: #f05265;
      --blue: #23b6e6;
      --yellow: #fff1a8;
      --paper: #fffdf7;
      --ink: #242424;
      --muted: #5b6573;
      --card: #ffffff;
      --shadow: 0 14px 34px rgba(37, 99, 235, 0.12);
      --radius-lg: 26px;
      --radius-md: 22px;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      font-family: "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #f8fbff 0%, #eef7ff 100%);
      padding: max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
      display: grid;
      place-items: center;
    }

    .worksheet {
      width: min(1280px, 100%);
      min-height: calc(100svh - 20px);
      margin: 0 auto;
      padding: clamp(14px, 1.8vw, 24px);
      background: var(--paper);
      border: 1px solid #e6eef8;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto 1fr;
      gap: clamp(10px, 1.3vw, 16px);
    }

    header {
      min-width: 0;
    }

    .topline {
      display: flex;
      align-items: baseline;
      gap: 10px;
      min-width: 0;
    }

    .range {
      flex: 0 0 auto;
      font-size: clamp(22px, 2.2vw, 30px);
      font-weight: 950;
      letter-spacing: -0.7px;
      color: #b7b7b7;
      line-height: 1;
    }

    .range strong { color: var(--pink); }

    h1 {
      margin: 0;
      font-size: clamp(28px, 3.1vw, 42px);
      line-height: 1.08;
      letter-spacing: -1.25px;
      font-weight: 950;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .intro {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: clamp(15px, 1.55vw, 20px);
      line-height: 1.35;
      letter-spacing: -0.35px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .landscape-layout {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(540px, 1.25fr) minmax(360px, 0.85fr);
      gap: clamp(14px, 1.8vw, 24px);
      align-items: stretch;
    }

    .table-card,
    .question-card {
      min-height: 0;
      border-radius: var(--radius-lg);
      background: var(--card);
      border: 1px solid #edf2f7;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
    }

    .table-card {
      padding: clamp(13px, 1.5vw, 20px);
      display: grid;
      grid-template-rows: 1fr auto auto;
      align-items: center;
      justify-items: center;
      gap: clamp(8px, 1.05vw, 12px);
      overflow: hidden;
    }

    .table-wrap {
      min-height: 0;
      width: 100%;
      display: grid;
      place-items: center;
      overflow: visible;
      padding: 2px;
    }

    .multiplication-table {
      --cell: min(calc((100svh - 288px) / 10), calc((62vw - 96px) / 10), 56px);
      border-collapse: separate;
      border-spacing: 0;
      overflow: hidden;
      border: 2px solid var(--green-3);
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 8px 18px rgba(116, 183, 25, 0.14);
      user-select: none;
      touch-action: manipulation;
    }

    .multiplication-table th,
    .multiplication-table td {
      width: clamp(42px, var(--cell), 56px);
      height: clamp(40px, var(--cell), 56px);
      min-width: 42px;
      text-align: center;
      vertical-align: middle;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      font-size: clamp(20px, 2.25vw, 28px);
      line-height: 1;
      transition: background-color 0.16s ease, transform 0.16s ease, outline-color 0.16s ease;
    }

    .multiplication-table tr:last-child th,
    .multiplication-table tr:last-child td { border-bottom: 0; }

    .multiplication-table th:last-child,
    .multiplication-table td:last-child { border-right: 0; }

    .multiplication-table th {
      background: var(--green-1);
      font-weight: 900;
    }

    .multiplication-table thead th {
      background: var(--green-2);
    }

    .multiplication-table td {
      cursor: pointer;
      background: #fffefa;
      font-weight: 700;
    }

    .multiplication-table td:hover,
    .multiplication-table td:focus-visible {
      background: #fff7cf;
      transform: scale(1.035);
      outline: 3px solid #ffd166;
      outline-offset: -3px;
    }

    .multiplication-table .row-focus,
    .multiplication-table .col-focus {
      background: #f5ffd8;
      font-weight: 950;
    }

    .multiplication-table .target {
      background: var(--yellow) !important;
      color: #c2410c;
      font-weight: 950;
      outline: 4px solid #ffb703;
      outline-offset: -4px;
      transform: scale(1.06);
      position: relative;
      z-index: 1;
    }

    .multiplication-table .mirror {
      background: #ffe4ea !important;
      color: #be123c;
      font-weight: 950;
    }

    .tools {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: nowrap;
      gap: clamp(8px, 1vw, 12px);
    }

    button {
      min-width: clamp(112px, 12vw, 150px);
      min-height: 44px;
      border: 0;
      border-radius: 999px;
      padding: 9px 18px;
      font-size: clamp(15px, 1.45vw, 18px);
      font-weight: 950;
      letter-spacing: -0.3px;
      cursor: pointer;
      color: #17324d;
      background: #e8f7ff;
      box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.07);
      touch-action: manipulation;
      white-space: nowrap;
    }

    button.primary { background: #d8f7ac; }
    button.reset { background: #edf2ff; }
    button:hover { filter: brightness(0.97); transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .status-line {
      width: min(100%, 620px);
      min-height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 14px;
      border-radius: 15px;
      background: #fff9db;
      border: 1px solid #ffe08a;
      text-align: center;
      font-size: clamp(14px, 1.35vw, 17px);
      line-height: 1.3;
      letter-spacing: -0.2px;
    }

    .question-card {
      padding: clamp(14px, 1.6vw, 22px);
      display: grid;
      grid-template-rows: auto 1fr 1fr;
      gap: clamp(10px, 1.25vw, 16px);
      overflow: hidden;
    }

    .question-title {
      margin: 0;
      font-size: clamp(24px, 2.45vw, 32px);
      line-height: 1.12;
      letter-spacing: -1px;
      font-weight: 950;
    }

    .question-row {
      min-height: 0;
      display: grid;
      grid-template-columns: clamp(70px, 7vw, 86px) 1fr;
      gap: clamp(10px, 1.1vw, 16px);
      align-items: center;
      padding: clamp(12px, 1.35vw, 18px);
      border: 1px solid #edf2f7;
      background: #fffefa;
      border-radius: var(--radius-md);
    }

    .q-badge {
      align-self: center;
    }

    .mascot {
      width: clamp(46px, 4.4vw, 56px);
      height: clamp(46px, 4.4vw, 56px);
      border-radius: 50%;
      background: #fff;
      border: 2px solid #303030;
      display: grid;
      place-items: center;
      font-size: clamp(22px, 2.2vw, 28px);
      box-shadow: 0 2px 0 rgba(0,0,0,0.1);
      transform: rotate(-9deg);
      margin: 0 auto;
    }

    .hand-circle {
      width: clamp(46px, 4.4vw, 56px);
      height: clamp(46px, 4.4vw, 56px);
      border-radius: 50%;
      background: var(--blue);
      color: white;
      display: grid;
      place-items: center;
      font-size: clamp(22px, 2.2vw, 28px);
      margin: -9px auto 0;
      border: 2px solid #8bdff8;
      box-shadow: 0 3px 0 rgba(0, 0, 0, 0.12);
    }

    .q-number {
      display: block;
      margin-top: 4px;
      text-align: center;
      font-size: clamp(38px, 4.1vw, 54px);
      line-height: 0.85;
      color: var(--pink);
      font-weight: 950;
    }

    .q-content {
      min-width: 0;
      font-size: clamp(18px, 1.85vw, 26px);
      line-height: 1.34;
      letter-spacing: -0.55px;
      font-weight: 800;
    }

    .answer-line {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      margin-top: clamp(10px, 1.15vw, 16px);
      font-size: clamp(20px, 2.1vw, 29px);
      font-weight: 900;
      white-space: nowrap;
    }

    .answer-line input {
      width: clamp(126px, 13vw, 180px);
      height: clamp(44px, 4.9vw, 58px);
      border: 0;
      border-bottom: 4px solid #252525;
      background: transparent;
      text-align: center;
      font-size: clamp(22px, 2.4vw, 32px);
      font-weight: 950;
      outline: none;
      color: #dc2626;
      border-radius: 12px 12px 0 0;
    }

    .answer-line input:focus { background: #fff8d7; }

    @media (orientation: landscape) and (min-width: 900px) {
      body {
        height: 100svh;
        overflow: hidden;
      }

      .worksheet {
        height: calc(100svh - 20px);
        max-height: 860px;
      }
    }

    @media (orientation: landscape) and (min-width: 900px) and (max-height: 760px) {
      .worksheet { padding: 14px 18px; gap: 8px; }
      h1 { font-size: clamp(26px, 2.8vw, 36px); }
      .intro { font-size: clamp(14px, 1.35vw, 17px); margin-top: 2px; }
      .landscape-layout { gap: 14px; }
      .table-card { padding: 12px 16px; gap: 8px; }
      .question-card { padding: 13px 16px; gap: 10px; }
      .question-row { padding: 11px 14px; }
      .question-title { font-size: clamp(22px, 2.2vw, 28px); }
      .q-content { font-size: clamp(17px, 1.7vw, 23px); line-height: 1.28; }
      .multiplication-table {
        --cell: min(calc((100svh - 274px) / 10), calc((62vw - 96px) / 10), 54px);
      }
      button { min-height: 40px; padding-block: 7px; }
      .status-line { min-height: 34px; padding-block: 6px; }
    }

    @media (max-width: 920px), (orientation: portrait) {
      body {
        height: auto;
        overflow: auto;
        padding: 10px;
      }

      .worksheet {
        height: auto;
        min-height: calc(100svh - 20px);
      }

      .topline { align-items: flex-start; }
      h1 { white-space: normal; }
      .intro { white-space: normal; }

      .landscape-layout {
        grid-template-columns: 1fr;
      }

      .table-card { overflow: visible; }
      .table-wrap { overflow-x: auto; justify-content: start; }

      .multiplication-table {
        --cell: min(calc((100vw - 88px) / 10), 52px);
      }

      .question-card {
        grid-template-rows: auto auto auto;
        overflow: visible;
      }

      .question-row {
        grid-template-columns: 66px 1fr;
      }

      .tools {
        flex-wrap: wrap;
      }
    }

    @media (hover: none) {
      .multiplication-table td:hover,
      button:hover { transform: none; }
    }
  </style>
</head>
<body>
  <main class="worksheet" aria-labelledby="main-title">
    <header>
      <div class="topline">
        <span class="range">[<strong>1~2</strong>]</span>
        <h1 id="main-title">36÷4의 해결 방법을 탐구해봅시다.</h1>
      </div>
      <p class="intro">곱셈구구표에서 4단을 살펴보고, 36이 되는 곱셈식을 찾아 몫을 구해 봅시다.</p>
    </header>

    <section class="landscape-layout" aria-label="곱셈구구 탐구 활동">
      <div class="table-card">
        <div class="table-wrap">
          <table class="multiplication-table" id="guguTable" aria-label="1부터 9까지의 곱셈구구표">
            <thead>
              <tr>
                <th scope="col">×</th>
                <th scope="col">1</th>
                <th scope="col">2</th>
                <th scope="col">3</th>
                <th scope="col">4</th>
                <th scope="col">5</th>
                <th scope="col">6</th>
                <th scope="col">7</th>
                <th scope="col">8</th>
                <th scope="col">9</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>

        <div class="tools" aria-label="활동 도구">
          <button class="primary" type="button" id="showDanBtn">① 4단 보기</button>
          <button class="primary" type="button" id="find36Btn">② 36 찾기</button>
          <button class="reset" type="button" id="resetBtn">초기화</button>
        </div>

        <div class="status-line" id="statusLine" aria-live="polite">
          표의 칸을 눌러 곱셈식을 확인해 보세요.
        </div>
      </div>

      <section class="question-card" aria-label="물음에 답하세요">
        <h2 class="question-title">물음에 답하세요.</h2>

        <div class="question-row">
          <div class="q-badge" aria-hidden="true">
            <div class="mascot">😊</div>
            <div class="hand-circle">☝</div>
            <span class="q-number">1</span>
          </div>
          <div class="q-content">
            <label for="q1">36÷4의 몫을 구하려면 몇 단 곱셈구구를 찾아야 할까요?</label>
            <div class="answer-line">(<input id="q1" type="text" inputmode="numeric" autocomplete="off" aria-label="1번 답" />)단</div>
          </div>
        </div>

        <div class="question-row">
          <div class="q-badge" aria-hidden="true">
            <div class="mascot">😊</div>
            <div class="hand-circle">☝</div>
            <span class="q-number">2</span>
          </div>
          <div class="q-content">
            <label for="q2">36÷4의 몫을 구해 보세요.</label>
            <div class="answer-line">(<input id="q2" type="text" inputmode="numeric" autocomplete="off" aria-label="2번 답" />)</div>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const tbody = document.getElementById('tableBody');
    const statusLine = document.getElementById('statusLine');
    const q1 = document.getElementById('q1');
    const q2 = document.getElementById('q2');

    function buildTable() {
      for (let r = 1; r <= 9; r++) {
        const tr = document.createElement('tr');
        const th = document.createElement('th');
        th.scope = 'row';
        th.textContent = r;
        th.dataset.rowHeader = r;
        tr.appendChild(th);

        for (let c = 1; c <= 9; c++) {
          const td = document.createElement('td');
          td.textContent = r * c;
          td.dataset.r = r;
          td.dataset.c = c;
          td.dataset.value = r * c;
          td.setAttribute('tabindex', '0');
          td.setAttribute('role', 'button');
          td.setAttribute('aria-label', `${r} 곱하기 ${c}는 ${r * c}`);
          td.addEventListener('click', () => selectCell(r, c));
          td.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' || event.key === ' ') {
              event.preventDefault();
              selectCell(r, c);
            }
          });
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      }
    }

    function clearHighlights() {
      document.querySelectorAll('.row-focus, .col-focus, .target, .mirror').forEach((el) => {
        el.classList.remove('row-focus', 'col-focus', 'target', 'mirror');
      });
    }

    function highlightRow(row) {
      clearHighlights();
      const rowHeader = document.querySelector(`[data-row-header="${row}"]`);
      if (rowHeader) rowHeader.classList.add('row-focus');
      document.querySelectorAll(`[data-r="${row}"]`).forEach((el) => el.classList.add('row-focus'));
      statusLine.innerHTML = `<strong>${row}단</strong>에서 36이 되는 곱셈식을 찾아보세요.`;
    }

    function highlightTarget() {
      highlightRow(4);
      const target = document.querySelector('[data-r="4"][data-c="9"]');
      const mirror = document.querySelector('[data-r="9"][data-c="4"]');
      if (target) target.classList.add('target');
      if (mirror) mirror.classList.add('mirror');
      statusLine.innerHTML = `4단에서 <strong>36</strong>이 되는 칸을 확인해 보세요.`;
    }

    function selectCell(r, c) {
      clearHighlights();
      const rowHeader = document.querySelector(`[data-row-header="${r}"]`);
      const colHeader = document.querySelector(`thead th:nth-child(${c + 1})`);
      const cell = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);

      if (rowHeader) rowHeader.classList.add('row-focus');
      if (colHeader) colHeader.classList.add('col-focus');
      document.querySelectorAll(`[data-r="${r}"]`).forEach((el) => el.classList.add('row-focus'));
      document.querySelectorAll(`[data-c="${c}"]`).forEach((el) => el.classList.add('col-focus'));
      if (cell) cell.classList.add('target');

      const value = r * c;
      statusLine.innerHTML = `<strong>${r} × ${c} = ${value}</strong>`;
    }

    function resetAll() {
      clearHighlights();
      q1.value = '';
      q2.value = '';
      statusLine.innerHTML = '표의 칸을 눌러 곱셈식을 확인해 보세요.';
    }

    document.getElementById('showDanBtn').addEventListener('click', () => highlightRow(4));
    document.getElementById('find36Btn').addEventListener('click', highlightTarget);
    document.getElementById('resetBtn').addEventListener('click', resetAll);

    buildTable();
  </script>
</body>
</html>
